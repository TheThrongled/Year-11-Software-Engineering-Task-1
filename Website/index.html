<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>
		Homepage
	</title>

	<style>
		body {
			margin: 0;
			padding: 0;
			font-family : Arial, sans-serif;
			background-color:white;
		
		}

		.first-screen {
			height: 100vh; 
  			display: flex;
  			flex-direction: column;
  			justify-content: space-between;
  			align-items: center;
  			background-color: white;

		}

		.welcome-container {
			width: 100%;
			display: flex;
			justify-content: center;
			padding-top: 35px;
			
		}
		.welcome-box {
			letter-spacing: 1.5px;
			font-size: 3rem;
			font-weight: regular;
			color:grey;

		}

		.main-container {
			height: 100vh;
			width: 100%;
			display: flex;
			justify-content: space-between;
			flex-direction: column;
			align-items: center;
			top: 50%;
		
		}
		.main-content {
			width: 850px;
			height: 450px;
			border-radius: 33px;
			background-color: #3498db;
			display: flex;
			align-items: center;
			justify-content: flex-start;
			flex-direction: column;
			gap: 40px;
			color: white;
			font-size: 1rem;
			font-weight: bold;
			padding-top: 40px;
			
		}

		progress {
  			-webkit-appearance: none;
  			-moz-appearance: none;
  			appearance: none;
  			width: 80%;
  			height:12%;
			border: none;
			border-radius: 50px;
			overflow: hidden;

		}

		progress::-webkit-progress-value {
  			background-color: #71ee2e;
  			border-radius: 50px;
		}

		progress::-moz-progress-bar {
  			background-color: #71ee2e;
  			border-radius: 50px;
		}

		.nav-bar {
			position: sticky;
			top: 0;
			bottom: 0;
			width: 100%;
			height: var(--nav-height);
			margin-top: calc(var(--nav-height) * -1);
			background-color: #3498db;
			display: flex;
			justify-content: space-between;
			box-sizing: border-box;
			align-items: center;
			padding: 15px;
			cursor: pointer;
    		transition: all 0.4s ease;
			z-index: 1000;
		
		}

		.nav-bar:hover {
			background-color: #5dade2;
		}

		.nav-btn {
    		background: transparent;
    		border: none;
    		padding: 1px;
    		border-radius: 1px;
    		
		}


		.nav-btn img {
    		width: 24px;
    		height: auto;
		}

		.courses-page {
			margin-top: var(--nav-height);
			height: 100vh;
			font-size: small;
			display: flex;
			flex-direction: column;
		
		}

		:root {
			--nav-height: 80px;
		}

	</style>
</head>

<body>

	<div class="first-screen">

	<div class="welcome-container">
		<div class="welcome-box">
			Welcome
		</div>
	</div>
	<div class="main-container">
		<div class="main-content">
			<progress value="70" max="100"></progress>
			You have completed 70% of courses. Keep on going!
			<div style="margin-top: auto; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; gap: 10px;">
				<span style="font-size: 1.2rem; color: white; font-weight: normal;">
        			Quick Access
    			</span>
				<div style="width: 500px; height: 200px; border-radius: 10px; border-color:white; border-width: 2px; border-style: solid; display: flex; align-items: top; justify-content: left; cursor: pointer;">
				Testy test
				</div>
			</div>
		</div>
	</div>
	</div>

	<nav class="nav-bar">
			
			<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-up-icon lucide-chevron-up"><path d="m18 15-6-6-6 6"/></svg>
			
			<a href="#" style="color: white; text-decoration: none; font-size: 2.2rem; font-weight: bold; margin-left: 20px;">Show Courses</a>
			
			<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-up-icon lucide-chevron-up"><path d="m18 15-6-6-6 6"/></svg>
			
	</nav>

	<section class="courses-page">
    	<h1>Courses List</h1>
    	<p>Placeholder content... your courses will go here.</p>
	</section>

	

</body>

</html>
