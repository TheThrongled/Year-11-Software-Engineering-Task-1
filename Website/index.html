<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>
		Homepage
	</title>

	<style>
		body {
			margin: 0;
			padding: 0;
			font-family : Arial, sans-serif;
			background-color:white;
		}
		.welcome-container {
			width: 100%;
			display: flex;
			justify-content: center;
			padding-top: 35px;
			
		}
		.welcome-box {
			font-size: 5rem;
			font-weight: bold;
			color:grey;

		}

		.main-container {
			width: 100%;
			display: flex;
			justify-content: center;
			flex-direction: column;
			align-items: center;
			top: 50%;
		}
		.main-content {
			width: 850px;
			height: 450px;
			border-radius: 33px;
			background-color: #3498db;
			display: flex;
			align-items: center;
			justify-content: flex-start;
			flex-direction: column;
			gap: 10px;
			color: white;
			font-size: 1rem;
			font-weight: bold;
			padding-top: 40px;
			
		}

		progress {
  			-webkit-appearance: none;
  			-moz-appearance: none;
  			appearance: none;
  			width: 80%;
  			height:12%;
			mar
		}

		.nav-btn {
    		background: transparent;
    		border: none;
    		padding: 10px;
    		border-radius: 8px;
    		cursor: pointer;
    		transition: background 0.3s ease;
    		display: flex;
    		align-items: center;
    		justify-content: center;
		}

		.nav-btn:hover {

    		background-color: rgba(255, 255, 255, 0.15);
		}

		.nav-btn img {
    		width: 24px;
    		height: auto;
		}
	</style>
</head>

<body>
	<div class="welcome-container">
		<div class="welcome-box">
			Welcome
		</div>
	</div>
	<div class="main-container">
		<div class="main-content">
			<progress value="70" max="100"></progress>
			You have completed 70% of courses. Keep on going!
			<div style="margin-top: auto; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; gap: 10px;">
				<span style="font-size: 1.2rem; color: white; font-weight: normal;">
        			Active Courses
    			</span>
				<div style="width: 500px; height: 200px; border-radius: 10px; border-color:white; border-width: 2px; border-style: solid; display: flex; align-items: top; justify-content: left; cursor: pointer;">
				Testy test
				</div>
			</div>
		</div>
	</div>

	<div>
		<nav style="position: fixed; bottom: 0; width: 100%; background-color: #3498db; display: flex; justify-content: space-between; box-sizing: border-box;align-items: center; padding: 15px;">
			<a></a>
			<a href="#" style="color: white; text-decoration: none; font-size: 2.6rem; font-weight: bold; margin-left: 20px;">Show Courses</a>
			<button>
				^
			</button>
		</nav>
	</div>
</body>

</html>
