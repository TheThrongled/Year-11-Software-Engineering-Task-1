<!DOCTYPE html>
<html lang="en">
<head>
	
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>
		Homepage
	</title>

	<style>

		:root {
			--nav-height: 10vh;
			--customblue: #2c5d97;

		}

		html {
			background-color: #f9f9f9;
			scroll-behavior: auto;
			scrollbar-width: none;
			height: auto;
			overflow-y: visible
		}

		body {
			margin: 0;
			padding: 0;
			font-family : Arial, sans-serif;
			background-color:white;
			overflow: visible
		
		}

		::-webkit-scrollbar {
      		-webkit-appearance: none;
  		}


		.first-screen {
			min-height: 0;
			height: calc(100vh - var(--nav-height)) ; 
  			display: flex;
  			flex-direction: column;
  			justify-content: space-between;
  			align-items: center;
  			background-color: #f9f9f9;

		}

		.welcome-container {
			width: 100%;
			display: flex;
			justify-content: center;
			padding-top: 35px;
			
		}
		.welcome-box {
			letter-spacing: 1.5px;
			font-size: 3rem;
			font-weight: bold;
			color:rgb(122, 119, 119);

		}

		.main-container {
			height: 100vh;
			width: 100%;
			display: flex;
			justify-content: space-between;
			flex-direction: column;
			align-items: center;
			top: 50%;
		
		}
		.main-content {
			width: 850px;
			height: 450px;
			border-radius: 33px;
			background-color: var(--customblue);
			display: flex;
			align-items: center;
			justify-content: flex-start;
			flex-direction: column;
			gap: 40px;
			color: white;
			font-size: 1rem;
			font-weight: bold;
			padding-top: 40px;
			
		}

		progress {
  			-webkit-appearance: none;
  			-moz-appearance: none;
  			appearance: none;
  			width: 80%;
  			height:12%;
			border: none;
			border-radius: 50px;
			overflow: clip;

		}

		progress::-webkit-progress-value {
  			background-color: rgb(1, 147, 1);
  			border-radius: 50px;
		}

		progress::-moz-progress-bar {
  			background-color: rgb(1, 147, 1);
  			border-radius: 50px;
		}

		.nav-bar {
			position: sticky;
			top: 0;
			width: 100%;
			height: var(--nav-height);
		
			background-color: var(--customblue);
			display: flex;
			justify-content: space-between;
			box-sizing: border-box;
			align-items: center;
			padding: 15px;
			
    		transition: all 0.4s ease;
			z-index: 1000;

			touch-action: none;
		
		}

		

		.nav-btn {
    		background: transparent;
    		border: none;
    		padding: 1px;
    		border-radius: 1px;
    		
		}


		.nav-btn img {
    		width: 24px;
    		height: auto;
		}

		.courses-page {
 
			box-sizing: border-box; 
			
			font-size: small;
			display: flex;
			flex-direction: column;
		
		}

		

		.map-container {
    		position: relative;
    		width: 100%;
    		min-height: 100vh;
    		background-color: #f9f9f9;
			background-image: 
			linear-gradient(to right, #e0e0e0 1px, transparent 1px),
			linear-gradient(to bottom, #e0e0e0 1px, transparent 1px);
			background-size: 40px 40px;
			
			width: 100%;
			height: 100vh; 
    		
		}

		.map-svg {
    		position: absolute;
    		top: 0;
    		left: 0;
    		width: 100%;
    		height: 100%;
    		z-index: 1;
		}

		.circle-node  {
    		position: absolute;
    		width: 60px;
    		height: 60px;
    		background-color: red;
    		border: 4px solid white;
    		border-radius: 50%;
    		cursor: pointer;
    		z-index: 2;
    		transform: translate(-50%, -50%); 
    		transition: transform 0.2s;
		}

		.circle-node.not-started {
			background-color: grey;
		}

		.circle-node.in-progress {
			background-color: rgb(247, 170, 28);
		}

		.circle-node.completed {
			background-color: green;
		}

		.circle-node:hover {
    		transform: translate(-50%, -50%) scale(1.2);
    		background-color: #2ecc71;
		}

		.map-popup {
			display: none;
			position: absolute;
			background: white;
			border: 2px solid #3498db;
			border-radius: 8px;
			padding: 10px;
			z-index: 100;
			transform: translate(-50%, -110%);
			box-shadow: 0 4px 15px rgba(0,0,0,0.2);
			min-width: 150px;
			text-align: center;
		}

		.quick-access-container {
			width: 80%;
			max-width: 500px;
			margin-top: 20px;
			text-align: left;
		}

		.quick-access-label {
			font-size: 1.2rem;
			color: rgba(255, 255, 255, 0.8);
			margin-bottom: 10px;
			display: block;
		}

		#quick-access-list {
			list-style: none;
			padding: 0;
			background: rgba(255, 255, 255, 0.1); /* Subtle transparent box */
			border-radius: 12px;
			overflow: hidden;
		}

		.quick-access-item {
			padding: 15px 20px;
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
			color: white;
			cursor: pointer;
			transition: background 0.2s;
			display: flex;
			justify-content: space-between;
		}

		.quick-access-item:last-child {
			border-bottom: none;
		}

		.quick-access-item:hover {
			background: rgba(255, 255, 255, 0.2);
		}

		.status-tag {
			font-size: 0.8rem;
			padding: 2px 8px;
			border-radius: 4px;
			background: rgba(255, 255, 255, 0.2);
		}



	</style>
</head>

<body>

	<div class="first-screen">

	<div class="welcome-container">
		<div class="welcome-box">
			Welcome
		</div>
	</div>
	<div class="main-container">
		<div class="main-content">
			<progress id="grand-progress-bar" value="0" max="100"></progress>
			<span id="progress-status-text">Loading status...</span>

			<hr style="border: none; border-top: 3px solid rgba(255,255,255,0.3); margin: 20px 0; width: 80%;">

			<div class="quick-access-container">
				<span class="quick-access-label">Quick Access</span>
				<ul id="quick-access-list">
					<!-- JS will inject the courses here -->
				</ul>
			</div>
		</div>
	</div>
	</div>

	<nav class="nav-bar">
			
			<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-up-icon lucide-chevron-up"><path d="m18 15-6-6-6 6"/></svg>
			
			<a href="#courses" style="color: white; text-decoration: none; font-size: 2.2rem; font-weight: bold; margin-left: 20px;">See Courses</a>
			
			<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-up-icon lucide-chevron-up"><path d="m18 15-6-6-6 6"/></svg>
			
	</nav>

	<section id="courses" class="courses-page">
    	<div class="map-container">
			<svg class="map-svg" id="mapSvg"></svg>
			<div id="nodes-layer"></div>

			<div id="map-popup" class="map-popup">
				<div id="popup-title" style="font-weight: bold; margin-bottom: 8px;"></div>
				<a id="start-quiz-link" href="#" style="display: block; background: #3498db; color: white; text-decoration: none; padding: 5px; border-radius: 4px;">Start Quiz</a>
			</div>
		</div>

		


	</section>



	<script src="map.js"></script>


</body>

</html>
